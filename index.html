<body>

  <head>
    <link rel="stylesheet" href="style.css">
  </head>
  <main class="app">
    <header class="hero">
      <h1>Timetable to Calendar</h1>
    </header>

    <section class="converter-card">
      <div id="dropZone" class="drop-zone">
        <textarea id="htmlInput" spellcheck="false" placeholder="Paste or drop Durham timetable HTML from timetable.dur.ac.uk"></textarea>
        <div class="drop-hint" aria-hidden="true">Drop timetable file</div>
      </div>

      <div class="action-row">
        <input id="htmlFileInput" class="file-input" type="file" accept=".html,.htm,text/html">
        <label class="button secondary" for="htmlFileInput">Choose file</label>
        <button id="extractButton" class="button primary" type="button">Extract timetable</button>
        <button id="clearButton" class="button ghost" type="button">Clear</button>
      </div>

      <section id="output" class="output" aria-live="polite" hidden>
        <p id="summaryText">Paste or upload a timetable to begin.</p>
        <strong id="eventCount" hidden>0</strong>

        <button id="downloadButton" class="button primary download" type="button" disabled>
          Download calendar
        </button>
      </section>

      <section class="tab-panel">
        <div class="tabs" role="tablist" aria-label="Additional tools">
          <button class="tab-button" type="button" data-tab-target="optionsPanel">Options</button>
          <button class="tab-button" type="button" data-tab-target="previewPanel">Preview</button>
        </div>

        <div id="optionsPanel" class="tab-content" hidden>
          <div class="options-grid">
            <div class="field">
              <label for="calendarName">Calendar name</label>
              <input id="calendarName" type="text" value="Imported timetable">
            </div>

            <div class="field">
              <label for="namingMode">Event names</label>
              <select id="namingMode">
                <option value="short" selected>Short module names</option>
                <option value="full">Full module names</option>
              </select>
            </div>

            <div class="field">
              <label for="alertMinutes">Teaching event alert</label>
              <select id="alertMinutes">
                <option value="" selected>No alert</option>
                <option value="5">5 minutes before</option>
                <option value="10">10 minutes before</option>
                <option value="15">15 minutes before</option>
                <option value="30">30 minutes before</option>
                <option value="60">1 hour before</option>
              </select>
            </div>

            <label class="check-row">
              <input id="includeTermEnds" type="checkbox">
              Include term-end markers
            </label>
          </div>

          <button id="downloadWeeksButton" class="button secondary" type="button" disabled>
            Download teaching weeks calendar
          </button>
        </div>

        <div id="previewPanel" class="tab-content" hidden>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Weeks</th>
                  <th>Time</th>
                  <th>Location</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="eventsTable">
                <tr class="empty-row">
                  <td colspan="5">Extract a timetable to preview grouped events.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

    </section>
  </main>

  <script src="script.js"></script>
</body>
